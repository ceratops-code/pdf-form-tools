name: Bug report
description: Report a reproducible defect in the package
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Exact steps, inputs, and files needed to reproduce the problem
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: 2.0.0
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, and anything else relevant
    validations:
      required: true
